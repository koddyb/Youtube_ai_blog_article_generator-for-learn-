{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}YT_BlogAI{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="{% static 'blog_generator/css/main.css' %}">
    {% block head_extra %}{% endblock %}
</head>
<body class="flex flex-col min-h-screen text-gray-100">

    <!-- Navbar -->
    <nav class="relative sticky top-0 z-50 px-4 sm:px-6 py-3 sm:py-4 flex justify-between items-center"
         style="background:rgba(7,7,15,.85); backdrop-filter:blur(20px);">
        <a href="/" class="text-xl sm:text-2xl font-black gradient-text tracking-tight">
            <i class="fa-solid fa-bolt"></i> YT_BlogAI
        </a>
        <div class="nav-actions flex items-center">
            {% if user.is_authenticated %}
                <span class="nav-username text-gray-500 text-sm font-medium mr-2">{{ user.username }}</span>
                <a href="/blog-list"><button class="btn-outline text-sm py-2 px-3 sm:px-4">My Blogs</button></a>
                <a href="/logout" class="ml-2"><button class="btn-danger text-sm py-2 px-3 sm:px-4">Logout</button></a>
            {% else %}
                <a href="/login"><button class="btn-outline text-sm py-2 px-3 sm:px-4">Login</button></a>
                <a href="/signup" class="ml-2"><button class="btn-primary text-sm py-2 px-3 sm:px-4">Sign up</button></a>
            {% endif %}
        </div>
    </nav>

    <!-- Main content -->
    <main class="flex-grow container mx-auto px-4 py-10">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="text-center py-5 text-gray-600 text-sm border-t" style="border-color:rgba(255,255,255,.06)">
        Powered by <a href="https://koddyb.github.io/my-portfolio/"
                      class="text-violet-400 hover:text-violet-300 transition font-semibold">KoddyB</a>
    </footer>

    <!-- Toast container -->
    <div id="toast-container" role="region" aria-live="polite"></div>

    <script>
        /* ── Toast system ── */
        const _T_ICONS  = {
            success: '<i class="fa-solid fa-circle-check"></i>',
            error:   '<i class="fa-solid fa-circle-xmark"></i>',
            warning: '<i class="fa-solid fa-triangle-exclamation"></i>',
            info:    '<i class="fa-solid fa-circle-info"></i>'
        };
        const _T_TITLES = { success: 'Succès', error: 'Erreur', warning: 'Attention', info: 'Info' };

        function showToast(message, type = 'info', title = null, duration = 4000) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <span class="toast-icon">${_T_ICONS[type] ?? '<i class="fa-solid fa-circle-info"></i>'}</span>
                <div class="toast-body">
                    <div class="toast-title">${title ?? _T_TITLES[type] ?? ''}</div>
                    ${message ? `<div class="toast-message">${message}</div>` : ''}
                </div>
                <button class="toast-close" aria-label="Fermer">✕</button>
                <div class="toast-progress" style="animation-duration:${duration}ms"></div>
            `;
            toast.querySelector('.toast-close').addEventListener('click', () => _removeToast(toast));
            container.appendChild(toast);
            setTimeout(() => _removeToast(toast), duration);
        }

        function _removeToast(toast) {
            if (!toast || toast.classList.contains('removing')) return;
            toast.classList.add('removing');
            setTimeout(() => toast.remove(), 280);
        }

        /* ── Confirm modal ── */
        function showConfirm({ icon = '<i class="fa-solid fa-trash-can fa-lg"></i>', title = 'Confirmation', message = '', confirmText = 'Confirmer', confirmClass = 'btn-danger', onConfirm }) {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `
                <div class="modal-box">
                    <div class="modal-icon">${icon}</div>
                    <div class="modal-title">${title}</div>
                    <div class="modal-message">${message}</div>
                    <div class="modal-actions">
                        <button class="btn-outline text-sm py-2 px-4 modal-cancel">Annuler</button>
                        <button class="${confirmClass} text-sm py-2 px-4 modal-confirm">${confirmText}</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            overlay.querySelector('.modal-cancel').addEventListener('click', () => overlay.remove());
            overlay.querySelector('.modal-confirm').addEventListener('click', () => { overlay.remove(); onConfirm(); });
            overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
        }

        /* ── Render Django messages as toasts on page load ── */
        document.addEventListener('DOMContentLoaded', () => {
            {% for message in messages %}
            showToast("{{ message|escapejs }}", "{{ message.level_tag }}");
            {% endfor %}
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
