<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}YT_BlogAI{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #07070f; }

        .glass {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(16px);
        }

        .gradient-text {
            background: linear-gradient(135deg, #a78bfa, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #0891b2);
            color: white;
            font-weight: 700;
            border-radius: 10px;
            padding: 10px 22px;
            transition: all .2s;
            border: none;
            cursor: pointer;
        }
        .btn-primary:hover { opacity: .85; transform: translateY(-1px); box-shadow: 0 0 24px rgba(124,58,237,.45); }

        .btn-outline {
            background: transparent;
            color: #d1d5db;
            font-weight: 600;
            border-radius: 10px;
            padding: 10px 22px;
            transition: all .2s;
            border: 1px solid rgba(255,255,255,.15);
            cursor: pointer;
        }
        .btn-outline:hover { background: rgba(255,255,255,.07); border-color: rgba(255,255,255,.3); color: white; }

        .btn-danger {
            background: rgba(239,68,68,.1);
            color: #f87171;
            font-weight: 600;
            border-radius: 8px;
            padding: 8px 16px;
            border: 1px solid rgba(239,68,68,.25);
            transition: all .2s;
            cursor: pointer;
        }
        .btn-danger:hover { background: rgba(239,68,68,.2); box-shadow: 0 0 16px rgba(239,68,68,.2); }

        .btn-ghost-icon {
            background: transparent;
            color: #6b7280;
            border-radius: 8px;
            padding: 7px;
            border: 1px solid transparent;
            transition: all .2s;
            cursor: pointer;
        }
        .btn-ghost-icon:hover { background: rgba(239,68,68,.1); color: #f87171; border-color: rgba(239,68,68,.2); }

        .input-dark {
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.12);
            color: white;
            border-radius: 10px;
            padding: 12px 16px;
            width: 100%;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .input-dark::placeholder { color: #4b5563; }
        .input-dark:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,.2); }

        .card { background: #0f0f1a; border: 1px solid rgba(255,255,255,.07); border-radius: 16px; }
        .card-hover { transition: border-color .2s, box-shadow .2s; }
        .card-hover:hover { border-color: rgba(124,58,237,.4); box-shadow: 0 0 32px rgba(124,58,237,.12); }

        /* Prose dark styles for rendered markdown */
        .prose-dark h1,.prose-dark h2,.prose-dark h3,.prose-dark h4 { color: #f3f4f6; font-weight: 700; margin: 1.4em 0 .6em; line-height: 1.3; }
        .prose-dark h1 { font-size: 1.75rem; }
        .prose-dark h2 { font-size: 1.4rem; border-bottom: 1px solid rgba(255,255,255,.08); padding-bottom: .4em; }
        .prose-dark h3 { font-size: 1.15rem; }
        .prose-dark p { color: #d1d5db; margin: .9em 0; line-height: 1.75; }
        .prose-dark ul,.prose-dark ol { color: #d1d5db; padding-left: 1.6em; margin: .8em 0; }
        .prose-dark li { margin: .35em 0; line-height: 1.7; }
        .prose-dark strong { color: #f9fafb; font-weight: 700; }
        .prose-dark em { color: #c4b5fd; }
        .prose-dark a { color: #38bdf8; text-decoration: underline; }
        .prose-dark code { background: rgba(124,58,237,.2); color: #c4b5fd; padding: 2px 6px; border-radius: 4px; font-size: .9em; }
        .prose-dark pre { background: rgba(0,0,0,.4); border: 1px solid rgba(255,255,255,.1); border-radius: 10px; padding: 1em; overflow-x: auto; }
        .prose-dark blockquote { border-left: 3px solid #7c3aed; padding-left: 1em; color: #9ca3af; font-style: italic; margin: 1em 0; }
        .prose-dark hr { border-color: rgba(255,255,255,.08); margin: 1.5em 0; }

        .line-clamp-3 { display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }

        /* Spinner */
        .spinner {
            width: 52px; height: 52px;
            border: 3px solid rgba(124,58,237,.2);
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin: 24px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Glow line under navbar */
        nav::after {
            content:'';
            display:block;
            position:absolute;
            bottom:0; left:0; right:0;
            height:1px;
            background: linear-gradient(90deg, transparent, rgba(124,58,237,.5), rgba(56,189,248,.5), transparent);
        }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body class="flex flex-col min-h-screen text-gray-100">

    <!-- Navbar -->
    <nav class="relative sticky top-0 z-50 px-6 py-4 flex justify-between items-center"
         style="background:rgba(7,7,15,.85); backdrop-filter:blur(20px);">
        <a href="/" class="text-2xl font-black gradient-text tracking-tight">⚡ YT_BlogAI</a>
        <div class="flex items-center gap-3">
            {% if user.is_authenticated %}
                <span class="text-gray-500 text-sm font-medium">{{ user.username }}</span>
                <a href="/blog-list"><button class="btn-outline text-sm py-2 px-4">My Blogs</button></a>
                <a href="/logout"><button class="btn-danger text-sm py-2 px-4">Logout</button></a>
            {% else %}
                <a href="/login"><button class="btn-outline text-sm py-2 px-4">Login</button></a>
                <a href="/signup"><button class="btn-primary text-sm py-2 px-4">Sign up</button></a>
            {% endif %}
        </div>
    </nav>

    <!-- Main content -->
    <main class="flex-grow container mx-auto px-4 py-10">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="text-center py-5 text-gray-600 text-sm border-t" style="border-color:rgba(255,255,255,.06)">
        Powered by <a href="https://koddyb.github.io/my-portfolio/"
                      class="text-violet-400 hover:text-violet-300 transition font-semibold">KoddyB</a>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
